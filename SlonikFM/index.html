<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
    </head>
<style>
html{
    background : #121219;
}
@font-face {
    font-family: 'SF Mono';
    src: url("SFMono-Bold.ttf");
}
*{
    font-family: 'SF Mono';
}
.player_ui{
    width: 90%;
    height: 90%;
    min-width: 230px;
    max-width: 500px;
    height: 400px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #070709;
    border: 1px solid #ccf;
    background-size: cover;
    overflow: hidden;

}
.player_audio{
    width: 60px;
    height: 150px;
    border-right: 1px solid #353555;
    border-bottom: 1px solid #353555;
    transform: translate(0px,-1px);
    background : #070709;
    display: inline-block;
}
.player_controls{
    width: 80%;
    height: 80%;
   transform: translateY(-5px);
 

}
.player_controls_button{
    min-width: 32px;
    font-size: auto;
    height: 32px;
    margin: 5px;
    transform: translate(6px,20px);
    display: inline-block;border: 1px solid #353535;
    overflow: hidden;
    color: #ccc;
    background: #0d0f15
    
}
.player_controls_button:hover{
    background: #2e4cd2; cursor: pointer;
}
.audio_track{
    background : #070709;
    width: 100%;
    height: 30px;
    
    border-bottom: 1px solid #111422;
    border-left: none;
    border-right: none;
    display: block;
    margin: auto;
    overflow: hidden;
    transform: translate(0px,0px);
}
.audio_tracks{
    width: 100%;
    height: 230px;
    overflow: scroll;
    transform: translate(0px,-152px);
}
.audio_track:hover{
    background: #2b2bcb!important;
    cursor: pointer;
    border-bottom:1px solid #2b2bcb;

}
.audio_tracks::-webkit-scrollbar{
    appearance: none;
    background: #070709;
    border-left:1px solid #353555;
    border-bottom: none;
    border-right: none;
    border-top: none;

}
.audio_tracks::-webkit-scrollbar-thumb{
    appearance: none;
    background: #353555;
    border-left:1px solid #353555;
    border-bottom: none;
    border-right: none;
    border-top: none;
    border-radius: 30px;
}
.audio_track_name{
    transform: translate(10px,-10px);
    color: #ccc;
    font-family: 'SF Mono';
    font-size: 14px;
}
.player_audio_data{
    width: calc(100% - 60px);
    height: 150px;
    display: inline-block;
    border:1px solid #353555;
    border-left: none;
    background-image: url("back.png");
    background-size: cover;
    transform: translate(60px,-152px);
}
#input_slider{

    min-width: 32px;
    font-size: auto;
    height: 32px;
    margin: 5px;
    transform: translate(10px,20px);
    overflow: hidden;
    background: transparent;
    -webkit-appearance: none;
    border: none;
}
#input_slider::-webkit-slider-runnable-track{
    -webkit-appearance: none;
    appearance: none;
    background: #0d0f15;
    width: 30px;
    height: 10px;
    border: 1px solid #353555;
}
#input_slider::-webkit-slider-thumb{
    -webkit-appearance: none;
    background: #ccf;
    width: 9px;
    height: 9px;

}
.wellcome{
    width: 100vw;
    height: 100vh;
    position: absolute;
    z-index: 3;
    background: #070709eb;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);

}
.ptext{
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    position: absolute;
    color: #ffe6ec
}
</style>
<div class="wellcome" onclick="document.getElementsByClassName('wellcome')[0].style.display='none';">
<p class="ptext">Нажми чтобы продолжить.<br>Это нужно для запуска плеера</p>
</div>
<p class="debugger" style="text-align:center;color: #ff0044;transform: translate(20px,-6px);">c</p>
<div class="player_ui">
<div class="player_audio">
    <audio id="audio_device"></audio>
<div class="player_controls">
<button class="player_controls_button">(P)</button>

<input class="player_controls_button" type="range" style="width: 50px;transform: translateY(10px);" id="input_slider" min="0" value="0.03" max="1" step="0.01">
<button class="player_controls_button" style=" transform: translate(6px,1px);">(R)</button>
</div>
</div>
<div class="player_audio_data"></div>
<br>
<div class="audio_tracks">


</div>
</div>
<script src="api.js"></script>
<script>
    var audio_tracks = document.getElementsByClassName("audio_tracks")[0];
    var debugger_str = document.getElementsByClassName("debugger")[0];
    window.addEventListener("error",function(slfm){
        debugger_str.innerHTML = slfm.error + " ln:"+slfm.lineno;
    });
    var playlistdata = document.getElementsByClassName("audio_tracks")[0];
    initDebugger(debugger_str);
    var audio_device = document.getElementById("audio_device");
    player.init(audio_device);
    //await get_file_list();
    player.play = document.getElementsByClassName("player_controls_button")[0];
    player.random = document.getElementsByClassName("player_controls_button")[2];
    player.volume = document.getElementById("input_slider");
    player.play.onclick = function(){
       
        player.playAudio();
    }
    player.random.onclick = function(){
        player.setID(Math.floor(Math.random() * (g_sAudioFilesArray.length - 1)),g_sAudioFilesArray);
    }
    player.audio.volume =   player.volume.value;
    player.volume.oninput = function(){
        player.audio.volume = this.value;
    }
    loadPlayList(playlistdata);
</script>
</html>
