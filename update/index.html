    <div class="connect_to_server_loading">
        <style>
        .connect_to_server_loading{
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 20;
            width: 300px;
            height: 340px;
            background: rgb(242, 242, 247);
            border-radius: 10px;
            transform: translate(-50%,-50%);
            display: none;
        }
        @keyframes loading {
            100%{
                transform:  rotate(0deg);
            }
            0%{
                transform:  rotate(360deg);
            }
        }
        .loading{
            background: transparent;
            border-left: 3px solid #0d1018;
            border-top: 3px solid transparent;
            border-bottom: 3px solid transparent;
            border-right: 3px solid transparent;
            border-radius: 32px;
            width: 32px;
            height: 32px;
            transform: rotate(180deg);
            margin: 20px;
            display: inline-block;
            animation: loading 100ms infinite ease-in-out;
        }
        .loading_text{
            display: inline-block;
            transform: translateY(-30px)
        }
        ._text{
            margin: 20px;
            font-size: 12px;
        }
        .close{
            display: block;
            margin: auto;
            width: 90%;
            outline: none;
            background: #f0f0f0;
            
            height: 24px;
            border: 1px solid #070707;
            cursor: pointer;
        }
        .close:hover{
            background: #ebe8ff;
        }
        </style>

<script src="api.js"></script>
<script>
    var timeline_data = {
        offset0:0,
        offset1:0,
        out0: document.getElementsByClassName("timeline_data")[0],
        out1: document.getElementsByClassName("timeline_data")[1],
    };
     var drw = document.querySelector(".wgl_canvas");
     var ctx = drw.getContext('2d');
    var g_server_url = document.getElementById("server_url");
    var g_server_folder = document.getElementById("server_folder");
    var g_sUrlToAPI = "";
    var g_sFolderServer = "";
    var g_connect_to_server = document.getElementsByClassName("connect_to_server")[0];
    var g_connect_to_server_loading= document.getElementsByClassName("connect_to_server_loading")[0];
    var g_link_style = document.getElementById("style");
    var audio_tracks = document.getElementsByClassName("audio_tracks")[0];
    var debugger_str = document.getElementsByClassName("debugger")[0];
    window.addEventListener("error",function(slfm){
        debugger_str.innerHTML = slfm.error + " ln:"+slfm.lineno;
    });
    var playlistdata = document.getElementsByClassName("audio_tracks")[0];
    initDebugger(debugger_str);
    var audio_device = document.getElementById("audio_device");
    player.init(audio_device);
    //

    drw.width = document.getElementsByClassName("volume_anim")[0].clientWidth;
    drw.height = document.getElementsByClassName("volume_anim")[0].clientHeight-130;
    let iFFTSize = 4096;
    let audioCtx, analyser, source;
    let isInitialized = false;
    function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audio_device);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    analyser.fftSize = iFFTSize; // Глубина детализации (от 32 до 32768)
    isInitialized = true;
}
function fmt(a) {
    const min = Math.floor(a / 60);
    const sec = Math.floor(a % 60);
    const m = min < 10 ? "0" + min : min;
    const s = sec < 10 ? "0" + sec : sec;
    
    return m + ":" + s;
}
var isEdited = false;
player.audio.addEventListener("timeupdate",function(){
    if (!audioCtx) initAudio();
    
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        
        
    }
    player.timeline.max =  timeline_data.offset1;
    player.timeline.min = 0;
    player.timeline.value =  timeline_data.offset0;
    timeline_data.out0.innerHTML = fmt(timeline_data.offset0);
    timeline_data.out1.innerHTML = fmt(timeline_data.offset1);
    if(!isEdited){
        timeline_data.offset0 = this.currentTime;
        timeline_data.offset1 = this.duration;
    }
    player.play.innerHTML = player.audio.paused ? "▶" :"||";
});
function randHex() {
    var hex_values = "0123456789ABCDEF";
    var out_hex = "#";
    for (var i = 0; i < 6; i++) {
       
        out_hex += hex_values[Math.floor(Math.random() * 16)];
    }
    return out_hex;
}
const bufferLength = 1024; 
const dataArray = new Uint8Array(bufferLength);

function render() {
    requestAnimationFrame(render);
    
    if (!isInitialized) return;

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, drw.width, drw.height);
    ctx.beginPath();
    ctx.moveTo(0, drw.height / 2);

    for (let i = 0; i < bufferLength - 1; i++) {
        const x = (i / bufferLength) * drw.width;
        const y = drw.height / 2 - (dataArray[i] / 2); 
        const nextX = ((i + 1) / bufferLength) * drw.width;
        const nextY = drw.height / 2 - (dataArray[i + 1] / 2);
        const xc = (x + nextX) / 2;
        const yc = (y + nextY) / 2;
        ctx.quadraticCurveTo(x, y, xc, yc);
        ctx.strokeStyle = "#ccf";
        
    }

    
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
}
render();

    //await get_file_list();
    player.play = document.getElementsByClassName("player_controls_button")[1];
    player.next = document.getElementsByClassName("player_controls_button")[2];
    player.prev = document.getElementsByClassName("player_controls_button")[0];
    player.random = document.getElementsByClassName("player_controls_button")[3];
    player.timeline = document.getElementsByClassName("player_controls_button")[6];
    player.volume = document.getElementById("input_slider");
    player.play.onclick = function(){
       
        player.playAudio();
        
    }
    player.play.innerHTML = player.audio.paused ? "▶" :"||";
    player.random.onclick = function(){
        player.setID(Math.floor(Math.random() * (g_sAudioFilesArray.length - 1)),g_sAudioFilesArray);
        playlistdata.scrollTo({
            top: player.id_file * 40,
            behavior: 'smooth'
            });
    }
    var track_index = 0;
    function scrollSet(){
        playlistdata.scrollTo({
            top: player.id_file * 20,
            behavior: 'smooth'
            });
    }
    player.next.onclick = function(){
        track_index++;
       
        player.setID(track_index - 1,g_sAudioFilesArray);
        if(track_index >= (g_sAudioFilesArray.length) - 1){
            track_index = g_sAudioFilesArray.length - 1;
        }
        scrollSet();
    }
    
    var g_fVolume = 0;
    
    window.addEventListener("keydown",function(key){
       if(key.code == 'ArrowUp'){
         player.audio.volume = g_fVolume;
         g_fVolume += 0.1;
         if(g_fVolume > 1){
            g_fVolume = 1;
         }
         player.volume.value = g_fVolume;
       }
       if(key.code == 'ArrowDown'){
         player.audio.volume = g_fVolume;
         g_fVolume -= 0.1;
         if(g_fVolume < 0){
            g_fVolume = 0;
         }
         player.volume.value = g_fVolume;
       }
       if(key.code == 'ArrowLeft'){
        player.prev.click();
       }
       if(key.code == 'ArrowRight'){
        player.next.click();
       }
    });
    player.prev.onclick = function(){
        track_index--;
        scrollSet();
        player.setID(track_index ,g_sAudioFilesArray);
        if(track_index < 1){
            track_index = 1;
        }
        scrollSet();
    }
    player.audio.volume =   player.volume.value;
    player.volume.oninput = function(){
        player.audio.volume = this.value;
    }
    player.audio.currentTime = player.timeline.value;
    player.timeline.oninput = function(){
        player.audio.currentTime = this.value;
        //isEdited = true;
    }
    loadPlayList(playlistdata);

    function connectServer(state){
       // g_connect_to_server_loading.style.display = "none";
        g_connect_to_server.style.display = state ? "block" : "none";
        
    }
    var connect_to_server_text = document.getElementsByClassName("connect_to_server_text")[2];
    function editConnectText(str0,str1){
        connect_to_server_text.innerHTML = `Пример:<br>1 графа: ${str0}<br>2 графа: ${str1}`
    }
    g_sFolderServer = g_server_folder.value;
    g_server_folder.oninput = function(){
        g_sFolderServer = this.value;
        editConnectText(g_sServer_url,g_sFolderServer);
    }
    g_sServer_url = g_server_url.value;
    g_server_url.oninput = function(){
        g_sServer_url = this.value;
        editConnectText(g_sServer_url,g_sFolderServer);
    }

    var server = {
        status: document.getElementsByClassName("_text")[0],
        code: document.getElementsByClassName("_text")[2],
        api: document.getElementsByClassName("_text")[1],
    };
    //127.0.0.1:4443/api/files
    function loadingToConnect(st){
        g_connect_to_server_loading.style.display = st ? "block": "none";
        get_file_list(g_sServer_url);
        g_sFileDir = g_sFolderServer;
    }
    function closeLoadingToConnect(){
        g_connect_to_server_loading.style.display = "none";
    }
</script>
